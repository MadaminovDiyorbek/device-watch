<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DeviceWatch — mahalliy</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #6b6b6b;
      --color-background-primary: #fff;
      --color-background-secondary: #f4f5f7;
      --color-border-tertiary: #eceef2;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--color-background-secondary); color: var(--color-text-primary); padding: 12px; max-width: 480px; margin: 0 auto; }
    .screen-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .app-title { font-size: 15px; font-weight: 600; }
    .live-badge { font-size: 9px; background: #e1f5ee; color: #0f6e56; padding: 2px 8px; border-radius: 20px; display: flex; align-items: center; gap: 4px; }
    .live-dot { width: 5px; height: 5px; border-radius: 50%; background: #1d9e75; animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .device-info-bar { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 8px; }
    .di-name { font-size: 13px; font-weight: 600; }
    .di-model { font-size: 10px; color: var(--color-text-secondary); margin-top: 2px; }
    .di-status { margin-left: auto; font-size: 9px; background: #e1f5ee; color: #0f6e56; padding: 2px 7px; border-radius: 20px; height: fit-content; }

    .tab-row { display: flex; border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; overflow: hidden; margin-bottom: 8px; }
    .tab-btn { flex: 1; font-size: 10px; padding: 6px 0; background: var(--color-background-primary); border: none; cursor: pointer; color: var(--color-text-secondary); border-right: 0.5px solid var(--color-border-tertiary); }
    .tab-btn:last-child { border-right: none; }
    .tab-btn.active { background: #e8f2fc; color: #185fa5; font-weight: 600; }

    .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
    .metric-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; padding: 8px 10px; }
    .mc-label { font-size: 9px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 3px; }
    .mc-val { font-size: 17px; font-weight: 600; }
    .mc-val.amber { color: #ba7517; }
    .mc-val.green { color: #1d9e75; }
    .mc-sub { font-size: 9px; color: var(--color-text-secondary); margin-top: 2px; }
    .mini-bar { height: 4px; border-radius: 2px; background: #eceef2; margin-top: 4px; overflow: hidden; }
    .mini-fill { height: 100%; border-radius: 2px; }
    .fill-amber { background: #ef9f27; }
    .fill-green { background: #1d9e75; }

    .section-title { font-size: 10px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; font-weight: 600; }
    .chart-area { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; }
    .chart-wrap { position: relative; height: 64px; }

    .net-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
    .net-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; padding: 8px 10px; }
    .net-dir { font-size: 9px; color: var(--color-text-secondary); margin-bottom: 2px; }
    .net-speed { font-size: 15px; font-weight: 600; }
    .net-unit { font-size: 9px; color: var(--color-text-secondary); }
    .net-total { font-size: 9px; color: var(--color-text-secondary); margin-top: 2px; }

    .cloud-status { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; padding: 8px 10px; display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .cloud-label { font-size: 10px; color: var(--color-text-secondary); }
    .cloud-val { font-size: 11px; font-weight: 600; flex: 1; }
    .cloud-badge { font-size: 9px; background: #e6f1fb; color: #185fa5; padding: 2px 7px; border-radius: 20px; }

    .sys-wrap { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; padding: 10px 12px; }
    .sys-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 11px; }
    .sys-row:last-child { border-bottom: none; }
    .sys-key { color: var(--color-text-secondary); }
    .sys-val { font-weight: 500; text-align: right; max-width: 62%; word-break: break-word; }
  </style>
</head>
<body>
  <div class="screen-header">
    <div class="app-title">DeviceWatch</div>
    <div class="live-badge"><span class="live-dot"></span> Jonli</div>
  </div>

  <div class="device-info-bar">
    <div style="font-size:18px;">🖥</div>
    <div style="flex:1;">
      <div class="di-name" id="ph-name">—</div>
      <div class="di-model" id="ph-sub">—</div>
    </div>
    <div class="di-status">Online</div>
  </div>

  <div class="tab-row">
    <button type="button" class="tab-btn active" data-tab="ph-overview">Ko'rsatkichlar</button>
    <button type="button" class="tab-btn" data-tab="ph-network">Tarmoq</button>
    <button type="button" class="tab-btn" data-tab="ph-info">Ma'lumot</button>
  </div>

  <div id="ph-overview">
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="mc-label">CPU</div>
        <div class="mc-val amber" id="ph-cpu">—</div>
        <div class="mc-sub" id="ph-cpu-m">—</div>
        <div class="mini-bar"><div class="mini-fill fill-amber" id="ph-cpu-bar" style="width:0%"></div></div>
      </div>
      <div class="metric-card">
        <div class="mc-label">RAM</div>
        <div class="mc-val green" id="ph-ram">—</div>
        <div class="mc-sub" id="ph-ram-s">—</div>
        <div class="mini-bar"><div class="mini-fill fill-green" id="ph-ram-bar" style="width:0%"></div></div>
      </div>
      <div class="metric-card">
        <div class="mc-label">Disk</div>
        <div class="mc-val green" id="ph-disk">—</div>
        <div class="mc-sub" id="ph-disk-s">—</div>
        <div class="mini-bar"><div class="mini-fill fill-green" id="ph-disk-bar" style="width:0%"></div></div>
      </div>
      <div class="metric-card">
        <div class="mc-label">Harorat</div>
        <div class="mc-val amber" id="ph-temp">—</div>
        <div class="mc-sub">CPU</div>
        <div class="mini-bar"><div class="mini-fill fill-amber" id="ph-temp-bar" style="width:0%"></div></div>
      </div>
    </div>
    <div class="section-title">CPU % (so'nggi)</div>
    <div class="chart-area"><div class="chart-wrap"><canvas id="ph-chart"></canvas></div></div>
  </div>

  <div id="ph-network" style="display:none;">
    <div class="net-row">
      <div class="net-card">
        <div class="net-dir">↑ Yuklash</div>
        <div class="net-speed"><span id="ph-up">0</span> <span class="net-unit">Mb/s</span></div>
        <div class="net-total">Sessiya: <span id="ph-up-tot">0</span> GB</div>
      </div>
      <div class="net-card">
        <div class="net-dir">↓ Yuklab olish</div>
        <div class="net-speed"><span id="ph-down">0</span> <span class="net-unit">Mb/s</span></div>
        <div class="net-total">Sessiya: <span id="ph-down-tot">0</span> GB</div>
      </div>
    </div>
    <div class="section-title">Trafik (Mb/s)</div>
    <div class="chart-area"><div class="chart-wrap"><canvas id="ph-net-chart"></canvas></div></div>
    <div class="cloud-status">
      <div style="font-size:16px;">☁</div>
      <div style="flex:1;">
        <div class="cloud-label">Cloud serverga sinx.</div>
        <div class="cloud-val" id="cloud-line">Oxirgi: —</div>
      </div>
      <div class="cloud-badge">Aktiv</div>
    </div>
  </div>

  <div id="ph-info" style="display:none;">
    <div class="sys-wrap" id="sys-rows"></div>
  </div>

  <script>
    const cpuHist = Array(20).fill(0);
    const upHist = Array(20).fill(0);
    const dnHist = Array(20).fill(0);
    let phChart, phNetChart;

    const chartOpts = {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { display: false },
        y: { min: 0, max: 100, ticks: { font: { size: 8 }, color: '#888' }, grid: { color: 'rgba(0,0,0,.06)' } },
      },
      elements: { point: { radius: 0 } },
    };

    function buildPhChart() {
      const ctx = document.getElementById('ph-chart');
      if (!ctx) return;
      if (phChart) phChart.destroy();
      phChart = new Chart(ctx, {
        type: 'line',
        data: { labels: cpuHist.map(() => ''), datasets: [{ data: [...cpuHist], borderColor: '#ef9f27', borderWidth: 1.5, fill: true, backgroundColor: 'rgba(239,159,39,.1)', tension: 0.4 }] },
        options: chartOpts,
      });
    }

    function buildPhNetChart() {
      const ctx = document.getElementById('ph-net-chart');
      if (!ctx || phNetChart) return;
      phNetChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: upHist.map(() => ''),
          datasets: [
            { data: [...dnHist], borderColor: '#1d9e75', borderWidth: 1.5, tension: 0.4 },
            { data: [...upHist], borderColor: '#378add', borderWidth: 1.5, tension: 0.4 },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { x: { display: false }, y: { ticks: { font: { size: 8 }, color: '#888' }, grid: { color: 'rgba(0,0,0,.06)' } } },
          elements: { point: { radius: 0 } },
        },
      });
    }

    document.querySelectorAll('.tab-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        const id = btn.getAttribute('data-tab');
        ['ph-overview', 'ph-network', 'ph-info'].forEach((x) => {
          document.getElementById(x).style.display = x === id ? '' : 'none';
        });
        if (id === 'ph-network') setTimeout(buildPhNetChart, 40);
      });
    });

    buildPhChart();

    function esc(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function fillInfo(s) {
      const sp = s.specs || {};
      const rows = [
        ['Protsessor', sp.cpu || s.cpuModel || '—'],
        ['RAM', sp.ram || '—'],
        ['Xotira', sp.disk || '—'],
        ['OS', sp.os || '—'],
        ['IP', sp.ip || '—'],
        ['Joylashuv', sp.location || '—'],
        ['Oxirgi sinx.', s.at ? new Date(s.at).toLocaleString('uz-UZ') : '—'],
      ];
      document.getElementById('sys-rows').innerHTML = rows
        .map(([k, v]) => `<div class="sys-row"><span class="sys-key">${esc(k)}</span><span class="sys-val">${esc(v)}</span></div>`)
        .join('');
    }

    async function poll() {
      try {
        const r = await fetch('/api/local/stats');
        const s = await r.json();
        if (s.ok === false) return;

        document.getElementById('ph-name').textContent = s.hostname || '—';
        document.getElementById('ph-sub').textContent = (s.osString || '').split(' / ').slice(1).join(' / ') || s.osString || '—';

        const cpu = Math.round(s.cpuUsage || 0);
        document.getElementById('ph-cpu').textContent = cpu + '%';
        document.getElementById('ph-cpu-m').textContent = s.cpuModel || '';
        document.getElementById('ph-cpu-bar').style.width = cpu + '%';

        const rp = Math.round(s.ramPercent || 0);
        document.getElementById('ph-ram').textContent = rp + '%';
        document.getElementById('ph-ram-s').textContent = (s.ramUsedGb != null ? s.ramUsedGb : '—') + ' / ' + (s.ramTotalGb != null ? s.ramTotalGb : '—') + ' GB';
        document.getElementById('ph-ram-bar').style.width = rp + '%';

        const dp = Math.round(s.diskPercent || 0);
        document.getElementById('ph-disk').textContent = dp + '%';
        document.getElementById('ph-disk-s').textContent = (s.diskUsedGb != null ? s.diskUsedGb : '—') + ' / ' + (s.diskTotalGb != null ? s.diskTotalGb : '—') + ' GB';
        document.getElementById('ph-disk-bar').style.width = dp + '%';

        const t = s.temperatureCpu;
        if (t != null && !Number.isNaN(t)) {
          document.getElementById('ph-temp').textContent = Math.round(t) + '°C';
          document.getElementById('ph-temp-bar').style.width = Math.min(100, (t / 95) * 100) + '%';
        } else {
          document.getElementById('ph-temp').textContent = '—';
          document.getElementById('ph-temp-bar').style.width = '0%';
        }

        document.getElementById('ph-up').textContent = s.netUpMbps != null ? s.netUpMbps.toFixed(1) : '0';
        document.getElementById('ph-down').textContent = s.netDownMbps != null ? s.netDownMbps.toFixed(1) : '0';
        document.getElementById('ph-up-tot').textContent = s.netTotalUpGb != null ? Number(s.netTotalUpGb).toFixed(2) : '0';
        document.getElementById('ph-down-tot').textContent = s.netTotalDownGb != null ? Number(s.netTotalDownGb).toFixed(2) : '0';

        document.getElementById('cloud-line').textContent = s.at ? new Date(s.at).toLocaleTimeString('uz-UZ') : '—';

        cpuHist.push(cpu);
        cpuHist.shift();
        if (phChart) {
          phChart.data.datasets[0].data = [...cpuHist];
          phChart.update('none');
        }

        const up = s.netUpMbps != null ? s.netUpMbps : 0;
        const dn = s.netDownMbps != null ? s.netDownMbps : 0;
        const scale = Math.max(10, up, dn, 1);
        upHist.push(Math.min(100, (up / scale) * 100));
        dnHist.push(Math.min(100, (dn / scale) * 100));
        upHist.shift();
        dnHist.shift();
        if (phNetChart) {
          phNetChart.data.datasets[0].data = [...dnHist];
          phNetChart.data.datasets[1].data = [...upHist];
          phNetChart.update('none');
        }

        fillInfo(s);
      } catch (_) {}
    }

    setInterval(poll, 1000);
    poll();
  </script>
</body>
</html>
