name: Build Agent (Windows EXE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agent/package-lock.json

      - name: Install dependencies
        run: npm ci

      # EXE foydalanuvchisi hech qanday .env yozmaydi — cloud URL va enrollment kalit shu qadamda EXE ichiga qotadi.
      # GitHub: Settings → Secrets and variables → Actions → Repository secrets:
      #   AGENT_SERVER_URL   (masalan https://device-watch-server.onrender.com)
      #   AGENT_ENROLLMENT_KEY  (Render ENROLLMENT_KEY bilan bir xil)
      - name: Embed cloud defaults for packaged EXE
        env:
          AGENT_SERVER_URL: ${{ secrets.AGENT_SERVER_URL }}
          AGENT_ENROLLMENT_KEY: ${{ secrets.AGENT_ENROLLMENT_KEY }}
        run: node scripts/write-cloud-defaults.js

      - name: Build EXE
        run: npm run build:win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: device-watch-agent-windows
          path: |
            agent/dist/device-watch-agent.exe
            agent/dist/public/**

