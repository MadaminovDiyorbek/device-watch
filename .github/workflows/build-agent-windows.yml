name: Build Agent (Windows EXE)

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: "Cloud SERVER_URL (faqat repo Secrets bo‘lmasa to‘ldiring)"
        required: false
        default: ""
      enrollment_key:
        description: "ENROLLMENT_KEY (faqat repo Secrets bo‘lmasa)"
        required: false
        default: ""

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agent/package-lock.json

      - name: Install dependencies
        run: npm ci

      # EXE ichiga cloud URL + enrollment kalit qotadi. Birinchi navbatda repo Secrets ishlatiladi;
      # bo‘lmasa — “Run workflow” formidagi ixtiyoriy maydonlar.
      # Doimiy: Settings → Secrets → AGENT_SERVER_URL, AGENT_ENROLLMENT_KEY
      #
      # MUHIM: `npm run build:win` ichidagi `build:win:prep` yana write-cloud-defaults ni chaqiradi.
      # Har bir `run` qadami alohida shell — shuning uchun secret/env shu qadamda o‘rnatilib,
      # darhol build ishlatiladi (aks holda keyingi qadamda env bo‘sh qolardi).
      - name: Embed cloud defaults and build EXE
        shell: pwsh
        run: |
          $u = "${{ secrets.AGENT_SERVER_URL }}"
          $k = "${{ secrets.AGENT_ENROLLMENT_KEY }}"
          if ([string]::IsNullOrWhiteSpace($u)) { $u = "${{ github.event.inputs.server_url }}" }
          if ([string]::IsNullOrWhiteSpace($k)) { $k = "${{ github.event.inputs.enrollment_key }}" }
          $env:AGENT_SERVER_URL = $u.Trim()
          $env:AGENT_ENROLLMENT_KEY = $k.Trim()
          node scripts/write-cloud-defaults.js
          npm run build:win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: device-watch-agent-windows
          path: |
            agent/dist/device-watch-agent.exe
            agent/dist/public/**

