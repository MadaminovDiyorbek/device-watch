services:
  - type: web
    name: device-watch-server
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /admin/
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: ENROLLMENT_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: TRUST_PROXY
        value: "1"
      - key: DATA_DIR
        value: /tmp/device-watch-data
