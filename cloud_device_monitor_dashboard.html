
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }

.dashboard { padding: 16px 0; }
.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.top-bar h1 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.live-dot { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; }
.stat-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
.stat-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.stat-sub { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
.stat-val.green { color: #1D9E75; }
.stat-val.amber { color: #BA7517; }
.stat-val.red { color: #E24B4A; }

.main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 12px; }
.devices-panel { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
.panel-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.panel-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.search-input { font-size: 12px; padding: 4px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-primary); width: 160px; }
.search-input:focus { outline: none; border-color: var(--color-border-primary); }

.device-row { display: grid; grid-template-columns: 28px 1fr 80px 80px 80px 60px 60px; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); cursor: pointer; transition: background .15s; }
.device-row:hover { background: var(--color-background-secondary); }
.device-row.selected { background: #E1F5EE; }
.device-row.header { background: var(--color-background-secondary); font-size: 10px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: .5px; font-weight: 500; cursor: default; }
.device-row.header:hover { background: var(--color-background-secondary); }

.device-icon { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.icon-pc { background: #E6F1FB; }
.icon-phone { background: #E1F5EE; }
.icon-tablet { background: #FAEEDA; }

.device-name { font-size: 12px; font-weight: 500; color: var(--color-text-primary); }
.device-model { font-size: 10px; color: var(--color-text-secondary); }
.cell { font-size: 12px; color: var(--color-text-primary); }

.bar-wrap { background: var(--color-background-secondary); border-radius: 3px; height: 6px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width .5s; }
.bar-green { background: #1D9E75; }
.bar-amber { background: #EF9F27; }
.bar-red { background: #E24B4A; }

.status-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.online { background: #E1F5EE; color: #0F6E56; }
.offline { background: #FCEBEB; color: #A32D2D; }
.warning { background: #FAEEDA; color: #854F0B; }

.right-col { display: flex; flex-direction: column; gap: 12px; }
.detail-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px 16px; }
.detail-title { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .5px; }
.detail-device-name { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 2px; }
.detail-model { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 12px; }

.spec-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.spec-row:last-child { border-bottom: none; }
.spec-key { font-size: 12px; color: var(--color-text-secondary); }
.spec-val { font-size: 12px; font-weight: 500; color: var(--color-text-primary); }

.meter-row { margin: 8px 0; }
.meter-label { display: flex; justify-content: space-between; margin-bottom: 4px; }
.meter-label span { font-size: 12px; color: var(--color-text-secondary); }
.meter-label strong { font-size: 12px; color: var(--color-text-primary); }
.meter-bar { background: var(--color-background-secondary); border-radius: 4px; height: 8px; overflow: hidden; }
.meter-fill { height: 100%; border-radius: 4px; transition: width .8s ease; }

.net-row { display: flex; gap: 10px; }
.net-card { flex: 1; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px; }
.net-direction { font-size: 10px; color: var(--color-text-secondary); margin-bottom: 4px; }
.net-speed { font-size: 16px; font-weight: 500; color: var(--color-text-primary); }
.net-unit { font-size: 11px; color: var(--color-text-secondary); }
.net-total { font-size: 10px; color: var(--color-text-secondary); margin-top: 3px; }

.chart-mini { margin-top: 8px; position: relative; height: 60px; }
.chart-mini canvas { width: 100% !important; height: 60px !important; }

.activity-log { max-height: 120px; overflow-y: auto; }
.log-item { display: flex; gap: 8px; padding: 4px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.log-item:last-child { border-bottom: none; }
.log-time { font-size: 10px; color: var(--color-text-secondary); white-space: nowrap; min-width: 45px; }
.log-msg { font-size: 11px; color: var(--color-text-primary); }
</style>

<div class="dashboard">

    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const devices = [
  { id:1, name:'PC-Ofis-01', model:'Dell OptiPlex 7090 / Windows 11', type:'pc', status:'online',
    specs:{ cpu:'Intel Core i7-11700', ram:'32 GB DDR4', disk:'512 GB SSD', os:'Windows 11 Pro', ip:'192.168.1.10', location:'Toshkent ofis' },
    cpu:72, ram:68, ramUsed:21.8, ramTotal:32, disk:45, diskUsed:230, diskTotal:512,
    netUp:12.4, netDown:38.2, netTotalUp:4.2, netTotalDown:18.6 },
  { id:2, name:'Laptop-Buxgalter', model:'Lenovo ThinkPad X1 / Windows 11', type:'pc', status:'online',
    specs:{ cpu:'Intel Core i5-1235U', ram:'16 GB DDR4', disk:'256 GB SSD', os:'Windows 11', ip:'192.168.1.15', location:'Moliya bo\'limi' },
    cpu:88, ram:82, ramUsed:13.1, ramTotal:16, disk:71, diskUsed:181, diskTotal:256,
    netUp:5.1, netDown:14.7, netTotalUp:2.1, netTotalDown:8.3 },
  { id:3, name:'iPhone-Rahbar', model:'iPhone 15 Pro / iOS 17', type:'phone', status:'online',
    specs:{ cpu:'Apple A17 Pro', ram:'8 GB', disk:'256 GB', os:'iOS 17.4', ip:'192.168.1.22', location:'Rahbariyat' },
    cpu:34, ram:55, ramUsed:4.4, ramTotal:8, disk:38, diskUsed:97, diskTotal:256,
    netUp:2.3, netDown:8.9, netTotalUp:0.8, netTotalDown:3.2 },
  { id:4, name:'Samsung-Galaxy-S24', model:'Samsung Galaxy S24 / Android 14', type:'phone', status:'online',
    specs:{ cpu:'Snapdragon 8 Gen 3', ram:'12 GB', disk:'256 GB', os:'Android 14', ip:'192.168.1.31', location:'Marketing' },
    cpu:41, ram:63, ramUsed:7.6, ramTotal:12, disk:52, diskUsed:133, diskTotal:256,
    netUp:3.8, netDown:11.2, netTotalUp:1.4, netTotalDown:5.9 },
  { id:5, name:'iPad-Dizayner', model:'iPad Pro 12.9" / iPadOS 17', type:'tablet', status:'online',
    specs:{ cpu:'Apple M2', ram:'16 GB', disk:'512 GB', os:'iPadOS 17', ip:'192.168.1.44', location:'Dizayn studiya' },
    cpu:56, ram:44, ramUsed:7.0, ramTotal:16, disk:29, diskUsed:148, diskTotal:512,
    netUp:18.6, netDown:52.4, netTotalUp:7.2, netTotalDown:24.1 },
  { id:6, name:'Server-Baza', model:'HP ProLiant DL380 / Ubuntu 22', type:'pc', status:'online',
    specs:{ cpu:'Intel Xeon Gold 6338', ram:'128 GB ECC', disk:'4 TB RAID', os:'Ubuntu 22.04 LTS', ip:'192.168.1.2', location:'Server xona' },
    cpu:23, ram:61, ramUsed:78.1, ramTotal:128, disk:34, diskUsed:1364, diskTotal:4000,
    netUp:88.3, netDown:142.7, netTotalUp:42.8, netTotalDown:78.3 },
  { id:7, name:'PC-Ombor-03', model:'HP Compaq / Windows 10', type:'pc', status:'offline',
    specs:{ cpu:'Intel Core i3-8100', ram:'8 GB DDR4', disk:'1 TB HDD', os:'Windows 10', ip:'192.168.1.55', location:'Ombor' },
    cpu:0, ram:0, ramUsed:0, ramTotal:8, disk:0, diskUsed:0, diskTotal:1000,
    netUp:0, netDown:0, netTotalUp:0.1, netTotalDown:0.4 },
  { id:8, name:'Huawei-MatePad', model:'Huawei MatePad Pro / HarmonyOS', type:'tablet', status:'warning',
    specs:{ cpu:'Kirin 9000s', ram:'12 GB', disk:'256 GB', os:'HarmonyOS 4.0', ip:'192.168.1.67', location:'Qabul' },
    cpu:91, ram:87, ramUsed:10.4, ramTotal:12, disk:66, diskUsed:169, diskTotal:256,
    netUp:1.2, netDown:4.8, netTotalUp:0.5, netTotalDown:2.1 },
];

const icons = { pc: '🖥', phone: '📱', tablet: '📋' };
const iconClass = { pc: 'icon-pc', phone: 'icon-phone', tablet: 'icon-tablet' };

function barColor(v) { return v > 85 ? 'bar-red' : v > 65 ? 'bar-amber' : 'bar-green'; }

function renderDevices(filter) {
  const list = document.getElementById('device-list');
  list.innerHTML = '';
  devices.filter(d => !filter || d.name.toLowerCase().includes(filter.toLowerCase())).forEach(d => {
    const row = document.createElement('div');
    row.className = 'device-row';
    row.dataset.id = d.id;
    const statusBadge = `<span class="status-badge ${d.status}">${d.status === 'online' ? 'Online' : d.status === 'offline' ? 'Offline' : 'Ogohlantirish'}</span>`;
    row.innerHTML = `
      <div class="device-icon ${iconClass[d.type]}" style="font-size:14px;">${icons[d.type]}</div>
      <div><div class="device-name">${d.name}</div><div class="device-model">${d.model.split('/')[0].trim()}</div></div>
      <div><div class="meter-bar" style="height:6px;"><div class="meter-fill ${barColor(d.cpu)}" style="width:${d.cpu}%"></div></div><div style="font-size:10px;color:var(--color-text-secondary);margin-top:2px;">${d.cpu}%</div></div>
      <div><div class="meter-bar" style="height:6px;"><div class="meter-fill ${barColor(d.ram)}" style="width:${d.ram}%"></div></div><div style="font-size:10px;color:var(--color-text-secondary);margin-top:2px;">${d.ram}%</div></div>
      <div><div class="meter-bar" style="height:6px;"><div class="meter-fill bar-green" style="width:${d.disk}%"></div></div><div style="font-size:10px;color:var(--color-text-secondary);margin-top:2px;">${d.disk}%</div></div>
      <div style="font-size:11px;color:var(--color-text-secondary);">↑${d.netUp}<br/>↓${d.netDown}</div>
      <div>${statusBadge}</div>
    `;
    row.addEventListener('click', () => showDetail(d.id));
    list.appendChild(row);
  });
}

let miniChart = null;
function showDetail(id) {
  const d = devices.find(x => x.id === id);
  document.querySelectorAll('.device-row').forEach(r => r.classList.remove('selected'));
  document.querySelector(`.device-row[data-id="${id}"]`)?.classList.add('selected');

  const detail = document.getElementById('detail-content');
  detail.innerHTML = `
    <div class="detail-device-name">${icons[d.type]} ${d.name}</div>
    <div class="detail-model">${d.model}</div>
    <div style="margin-bottom:12px;">
      ${Object.entries(d.specs).map(([k,v]) => `
        <div class="spec-row"><span class="spec-key">${({cpu:'Protsessor',ram:'RAM',disk:'Xotira',os:'OS',ip:'IP manzil',location:'Joylashuv'})[k]||k}</span><span class="spec-val">${v}</span></div>
      `).join('')}
    </div>
    <div class="detail-title" style="margin-bottom:8px;">Real vaqt ko'rsatkichlari</div>
    <div class="meter-row">
      <div class="meter-label"><span>CPU yuklama</span><strong>${d.cpu}%</strong></div>
      <div class="meter-bar"><div class="meter-fill ${barColor(d.cpu)}" style="width:${d.cpu}%"></div></div>
    </div>
    <div class="meter-row">
      <div class="meter-label"><span>RAM — ${d.ramUsed} GB band / ${d.ramTotal} GB</span><strong>${d.ram}%</strong></div>
      <div class="meter-bar"><div class="meter-fill ${barColor(d.ram)}" style="width:${d.ram}%"></div></div>
    </div>
    <div class="meter-row">
      <div class="meter-label"><span>Disk — ${d.diskUsed > 999 ? (d.diskUsed/1000).toFixed(1)+' TB' : d.diskUsed+' GB'} / ${d.diskTotal > 999 ? (d.diskTotal/1000).toFixed(0)+' TB' : d.diskTotal+' GB'}</span><strong>${d.disk}%</strong></div>
      <div class="meter-bar"><div class="meter-fill bar-green" style="width:${d.disk}%"></div></div>
    </div>
    <div class="detail-title" style="margin-top:12px;margin-bottom:8px;">Tarmoq trafigi</div>
    <div class="net-row">
      <div class="net-card">
        <div class="net-direction">↑ Yuklash</div>
        <div class="net-speed">${d.netUp} <span class="net-unit">Mb/s</span></div>
        <div class="net-total">Jami: ${d.netTotalUp} GB</div>
      </div>
      <div class="net-card">
        <div class="net-direction">↓ Yuklab olish</div>
        <div class="net-speed">${d.netDown} <span class="net-unit">Mb/s</span></div>
        <div class="net-total">Jami: ${d.netTotalDown} GB</div>
      </div>
    </div>
    <div class="chart-mini"><canvas id="mini-chart" role="img" aria-label="CPU faollik grafigi">CPU faollik tarixi</canvas></div>
  `;

  if (miniChart) { miniChart.destroy(); miniChart = null; }
  const cpuBase = d.cpu;
  const hist = Array.from({length:10}, (_,i) => Math.max(0, Math.min(100, cpuBase + (Math.random()-0.5)*20)));
  setTimeout(() => {
    const ctx = document.getElementById('mini-chart');
    if (!ctx) return;
    miniChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: hist.map((_,i) => i === 9 ? 'Hozir' : `-${(9-i)*10}s`),
        datasets: [{ label: 'CPU %', data: hist, borderColor: cpuBase > 85 ? '#E24B4A' : cpuBase > 65 ? '#EF9F27' : '#1D9E75', borderWidth: 1.5, fill: false, tension: 0.4, pointRadius: 0 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { x: { ticks: { font: { size: 9 }, color: '#888' }, grid: { display: false } }, y: { min: 0, max: 100, ticks: { font: { size: 9 }, color: '#888', stepSize: 50 }, grid: { color: 'rgba(128,128,128,.1)' } } }
      }
    });
  }, 50);
}

const logs = [
  { time:'09:42', msg:'Server-Baza disk yozuvi yuqori' },
  { time:'09:38', msg:'Huawei-MatePad CPU 91% ga yetdi' },
  { time:'09:31', msg:'PC-Ombor-03 tarmoqdan uzildi' },
  { time:'09:18', msg:'Buxgalter laptopi RAM chegarasi oshdi' },
  { time:'08:55', msg:'6 ta qurilma muvaffaqiyatli ulandi' },
  { time:'08:30', msg:'Tizim ishga tushdi' },
];
const logDiv = document.getElementById('activity-log');
logs.forEach(l => {
  const item = document.createElement('div');
  item.className = 'log-item';
  item.innerHTML = `<span class="log-time">${l.time}</span><span class="log-msg">${l.msg}</span>`;
  logDiv.appendChild(item);
});

document.getElementById('search-box').addEventListener('input', e => renderDevices(e.target.value));

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('uz-UZ');
}
setInterval(updateClock, 1000);
updateClock();

setInterval(() => {
  devices.forEach(d => {
    if (d.status !== 'online') return;
    d.cpu = Math.max(5, Math.min(99, d.cpu + (Math.random()-0.5)*8));
    d.ram = Math.max(10, Math.min(98, d.ram + (Math.random()-0.5)*3));
    d.netDown = Math.max(0.5, d.netDown + (Math.random()-0.5)*4);
    d.netUp = Math.max(0.2, d.netUp + (Math.random()-0.5)*2);
  });
  renderDevices(document.getElementById('search-box').value);
}, 3000);

renderDevices();
</script>
